name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: npm ci
      - run: npm run ci
      - run: npm run demo:build
      - run: npm pack --dry-run
